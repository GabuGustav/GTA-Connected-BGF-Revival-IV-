[build]
  command = "echo 'No build needed'"
  functions = "netlify/functions"
  
[dev]
  command = "netlify dev"

[dependencies]
  netlify-cli = "^17.0.0"

[dev-dependencies]
  netlify-cli = "^17.0.0"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
