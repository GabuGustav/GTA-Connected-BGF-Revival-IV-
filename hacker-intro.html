<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKSITE CONNECTION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff9f;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Server Room Background */
        .server-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 159, 0.05) 0%, #000 70%);
            opacity: 1;
            transition: opacity 2s ease-out;
        }

        .server-room.fade-out {
            opacity: 0;
        }

        /* Binary Rain Canvas */
        #binaryCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            z-index: 1;
        }

        /* Terminal Container */
        .terminal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            height: 400px;
            background: rgba(0, 15, 10, 0.95);
            border: 2px solid #00ff9f;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 159, 0.3);
            z-index: 10;
            opacity: 0;
            animation: terminalGlow 2s ease-in-out infinite alternate;
        }

        @keyframes terminalGlow {
            0% { box-shadow: 0 0 30px rgba(0, 255, 159, 0.3); }
            100% { box-shadow: 0 0 60px rgba(0, 255, 159, 0.5); }
        }

        .terminal-container.show {
            animation: terminalAppear 1s ease-out forwards;
        }

        @keyframes terminalAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Terminal Lines */
        .terminal-line {
            margin: 8px 0;
            font-size: 14px;
            opacity: 0;
            animation: typewriterLine 0.5s ease-out forwards;
        }

        @keyframes typewriterLine {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .terminal-line.error {
            color: #ff6b6b;
            animation: typewriterError 0.5s ease-out forwards;
        }

        @keyframes typewriterError {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .terminal-line.warning {
            color: #ffd93d;
        }

        .terminal-line.success {
            color: #00ff9f;
            text-shadow: 0 0 10px rgba(0, 255, 159, 0.8);
        }

        /* Loading Bar */
        .loading-container {
            margin-top: 30px;
            opacity: 0;
            animation: loadingAppear 1s ease-out 2s forwards;
        }

        @keyframes loadingAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 255, 159, 0.1);
            border: 1px solid #00ff9f;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ff9f, #00cc7f);
            width: 0%;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.6);
        }

        .loading-text {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Laptop Screen */
        .laptop-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 20;
            transform: scale(0.5);
            transition: all 2s ease-out;
        }

        .laptop-screen.active {
            opacity: 1;
            transform: scale(1);
        }

        .laptop-frame {
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: #111;
            border: 3px solid #00ff9f;
            border-radius: 15px;
            box-shadow: 0 0 100px rgba(0, 255, 159, 0.5);
            position: relative;
            overflow: hidden;
        }

        .laptop-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
        }

        .laptop-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(0, 255, 159, 0.8);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .laptop-buttons {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .laptop-btn {
            background: transparent;
            border: 2px solid #00ff9f;
            color: #00ff9f;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .laptop-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 159, 0.2);
            transition: left 0.3s ease;
        }

        .laptop-btn:hover::before {
            left: 0;
        }

        .laptop-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 159, 0.6);
            transform: translateY(-3px);
        }

        /* Glitch Effects */
        .glitch {
            animation: glitchEffect 0.3s ease-in-out;
        }

        @keyframes glitchEffect {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .rgb-split {
            animation: rgbSplit 0.5s ease-in-out;
        }

        @keyframes rgbSplit {
            0%, 100% { filter: hue-rotate(0deg); }
            33% { filter: hue-rotate(120deg); }
            66% { filter: hue-rotate(240deg); }
        }

        /* Screen Flicker */
        .screen-flicker {
            animation: screenFlicker 0.1s ease-in-out;
        }

        @keyframes screenFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .terminal-container {
                width: 90%;
                height: 300px;
                padding: 20px;
            }
            
            .laptop-title {
                font-size: 1.8rem;
            }
            
            .laptop-buttons {
                flex-direction: column;
                gap: 20px;
            }
            
            .laptop-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Server Room Background -->
    <div class="server-room" id="serverRoom">
        <!-- Binary Rain Canvas -->
        <canvas id="binaryCanvas"></canvas>
        
        <!-- Terminal Container -->
        <div class="terminal-container" id="terminal">
            <div id="terminalOutput"></div>
            
            <!-- Loading Container -->
            <div class="loading-container" id="loadingContainer">
                <div class="loading-bar">
                    <div class="loading-progress" id="loadingProgress"></div>
                </div>
                <div class="loading-text" id="loadingText">INITIALIZING...</div>
            </div>
        </div>
    </div>
    
    <!-- Laptop Screen (Hidden Initially) -->
    <div class="laptop-screen" id="laptopScreen">
        <div class="laptop-frame">
            <div class="laptop-content">
                <h1 class="laptop-title">BLACKSITE ACCESS</h1>
                <div class="laptop-buttons">
                    <button class="laptop-btn" onclick="goToRegister()">CREATE ACCOUNT</button>
                    <button class="laptop-btn" onclick="goToLogin()">EXISTING USER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Binary Rain Effect
        class BinaryRain {
            constructor() {
                this.canvas = document.getElementById('binaryCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.columns = [];
                this.init();
                this.animate();
                
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.columnWidth = 20;
                this.columnCount = Math.floor(this.canvas.width / this.columnWidth);
            }
            
            init() {
                for (let i = 0; i < this.columnCount; i++) {
                    this.columns[i] = {
                        x: i * this.columnWidth,
                        y: Math.random() * this.canvas.height,
                        speed: 1 + Math.random() * 2,
                        chars: [],
                        opacity: Math.random() * 0.5 + 0.3
                    };
                    
                    const charCount = Math.floor(Math.random() * 10) + 5;
                    for (let j = 0; j < charCount; j++) {
                        this.columns[i].chars.push(Math.random() > 0.5 ? '1' : '0');
                    }
                }
            }
            
            animate() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.font = '12px Courier New';
                
                this.columns.forEach(column => {
                    column.chars.forEach((char, index) => {
                        const y = column.y - (index * 15);
                        
                        if (y > 0 && y < this.canvas.height) {
                            const fadeOpacity = (1 - index / column.chars.length) * column.opacity;
                            const green = Math.floor(255 * fadeOpacity);
                            
                            this.ctx.fillStyle = `rgba(0, ${green}, 159, ${fadeOpacity})`;
                            this.ctx.fillText(char, column.x, y);
                        }
                    });
                    
                    column.y += column.speed;
                    
                    if (column.y - column.chars.length * 15 > this.canvas.height) {
                        column.y = -column.chars.length * 15;
                        column.speed = 1 + Math.random() * 2;
                        column.opacity = Math.random() * 0.5 + 0.3;
                    }
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }

        // Hacker Intro System
        class HackerIntro {
            constructor() {
                this.binaryRain = new BinaryRain();
                this.terminalLines = [];
                this.currentLineIndex = 0;
                this.loadingProgress = 0;
                this.phase = 'terminal';
                
                this.generateTerminalLines();
                this.startIntro();
            }
            
            generateTerminalLines() {
                const fakeIPs = [
                    '192.168.42.77',
                    '10.0.0.1',
                    '172.16.0.1',
                    '203.0.113.42',
                    '198.51.100.7',
                    '8.8.8.8'
                ];
                
                const crypticWords = [
                    'QUANTUM_ENCRYPTION',
                    'NEURAL_DECRYPTION',
                    'FIREWALL_BYPASS',
                    'PROTOCOL_INJECTION',
                    'KERNEL_ACCESS',
                    'ROOT_PRIVILEGES',
                    'STEALTH_MODE',
                    'CIPHER_BREAK',
                    'HEX_DECODER',
                    'BINARY_MATRIX',
                    'ALGORITHM_CRACK',
                    'SECURITY_BREACH'
                ];
                
                const loadingMessages = [
                    'Initializing quantum encryption...',
                    'Bypassing firewall protocols...',
                    'Decrypting neural pathways...',
                    'Establishing secure connection...',
                    'Loading kernel modules...',
                    'Scanning network topology...',
                    'Compiling exploit vectors...',
                    'Initializing root access...',
                    'Configuring stealth mode...',
                    'Analyzing system vulnerabilities...'
                ];
                
                this.terminalLines = [
                    { text: '> BOOTING BLACKSITE SYSTEM...', type: 'success', delay: 0 },
                    { text: `> CONNECTING TO ${fakeIPs[Math.floor(Math.random() * fakeIPs.length)]}...`, type: 'normal', delay: 800 },
                    { text: '> AUTHENTICATING...', type: 'normal', delay: 1600 },
                    { text: '> ESTABLISHING SECURE CHANNEL...', type: 'normal', delay: 2400 },
                    { text: '> LOADING SECURITY PROTOCOLS...', type: 'normal', delay: 3200 },
                    { text: `${crypticWords[Math.floor(Math.random() * crypticWords.length)]}... ACTIVE`, type: 'warning', delay: 4000 },
                    { text: `${loadingMessages[Math.floor(Math.random() * loadingMessages.length)]}`, type: 'normal', delay: 4800 },
                    { text: '> DECRYPTING NODE...', type: 'normal', delay: 5600 },
                    { text: '> ACCESS GRANTED', type: 'success', delay: 6400 },
                    { text: '> WELCOME TO BLACKSITE NETWORK', type: 'success', delay: 7200 }
                ];
                
                // Add some random errors
                if (Math.random() > 0.7) {
                    this.terminalLines.splice(4, 0, { text: '> ERROR: CONNECTION INTERRUPTED', type: 'error', delay: 3600 });
                    this.terminalLines.splice(5, 0, { text: '> RETRYING...', type: 'warning', delay: 4400 });
                }
            }
            
            startIntro() {
                this.showTerminal();
                setTimeout(() => this.startLoading(), 8000);
            }
            
            showTerminal() {
                const terminal = document.getElementById('terminal');
                const output = document.getElementById('terminalOutput');
                
                terminal.classList.add('show');
                
                this.terminalLines.forEach((line, index) => {
                    setTimeout(() => {
                        this.addTerminalLine(line.text, line.type);
                    }, line.delay);
                });
            }
            
            addTerminalLine(text, type = 'normal') {
                const output = document.getElementById('terminalOutput');
                const line = document.createElement('div');
                line.className = `terminal-line ${type}`;
                line.textContent = text;
                
                output.appendChild(line);
                
                // Typewriter effect
                line.style.width = '0';
                line.style.whiteSpace = 'nowrap';
                line.style.overflow = 'hidden';
                
                setTimeout(() => {
                    line.style.transition = 'width 0.5s ease-out';
                    line.style.width = '100%';
                }, 100);
                
                // Random glitch effect
                if (Math.random() > 0.8) {
                    setTimeout(() => {
                        line.classList.add('glitch');
                        setTimeout(() => line.classList.remove('glitch'), 300);
                    }, 600);
                }
            }
            
            startLoading() {
                const loadingContainer = document.getElementById('loadingContainer');
                const loadingProgress = document.getElementById('loadingProgress');
                const loadingText = document.getElementById('loadingText');
                
                const loadingMessages = [
                    'INITIALIZING...',
                    'DECRYPTING...',
                    'BYPASSING...',
                    'ACCESSING...',
                    'CONNECTING...'
                ];
                
                let progress = 0;
                const loadingInterval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(loadingInterval);
                        
                        setTimeout(() => {
                            this.transitionToLaptop();
                        }, 1000);
                    }
                    
                    loadingProgress.style.width = `${progress}%`;
                    loadingText.textContent = `${loadingMessages[Math.floor(Math.random() * loadingMessages.length)]} ${Math.floor(progress)}%`;
                    
                    // Random screen flicker
                    if (Math.random() > 0.9) {
                        document.getElementById('serverRoom').classList.add('screen-flicker');
                        setTimeout(() => {
                            document.getElementById('serverRoom').classList.remove('screen-flicker');
                        }, 100);
                    }
                }, 200);
            }
            
            transitionToLaptop() {
                const serverRoom = document.getElementById('serverRoom');
                const laptopScreen = document.getElementById('laptopScreen');
                
                // Add RGB split effect
                serverRoom.classList.add('rgb-split');
                
                setTimeout(() => {
                    serverRoom.classList.add('fade-out');
                    laptopScreen.classList.add('active');
                    
                    setTimeout(() => {
                        serverRoom.style.display = 'none';
                    }, 2000);
                }, 500);
            }
        }
        
        // Navigation Functions
        function goToRegister() {
            window.location.href = 'hacker-register.html';
        }
        
        function goToLogin() {
            window.location.href = 'index.html#mail';
        }
        
        // Initialize Intro
        document.addEventListener('DOMContentLoaded', () => {
            new HackerIntro();
        });
    </script>
</body>
</html>
