<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACKSITE CONNECTION</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff9f;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Server Room Background */
        .server-room {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 159, 0.05) 0%, #000 70%);
            opacity: 1;
            transition: opacity 2s ease-out;
        }

        .server-room.fade-out {
            opacity: 0;
        }

        /* Binary Rain Canvas */
        #binaryCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.3;
            z-index: 1;
        }

        /* Terminal Container */
        .terminal-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            height: 400px;
            background: rgba(0, 15, 10, 0.95);
            border: 2px solid #00ff9f;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 159, 0.3);
            z-index: 10;
            opacity: 1;
            display: block;
            animation: terminalGlow 2s ease-in-out infinite alternate;
        }

        .terminal-container.show {
            animation: terminalGlow 2s ease-in-out infinite alternate;
        }

        @keyframes terminalGlow {
            0% { box-shadow: 0 0 30px rgba(0, 255, 159, 0.3); }
            100% { box-shadow: 0 0 60px rgba(0, 255, 159, 0.5); }
        }

        /* Terminal Lines */
        .terminal-line {
            margin: 8px 0;
            font-size: 14px;
            opacity: 1;
        }

        .terminal-line.error {
            color: #ff6b6b;
        }

        .terminal-line.warning {
            color: #ffd93d;
        }

        .terminal-line.success {
            color: #00ff9f;
            text-shadow: 0 0 10px rgba(0, 255, 159, 0.8);
        }

        /* Loading Bar */
        .loading-container {
            margin-top: 30px;
            opacity: 1;
        }

        @keyframes loadingAppear {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-bar {
            width: 100%;
            height: 20px;
            background: rgba(0, 255, 159, 0.1);
            border: 1px solid #00ff9f;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #00ff9f, #00cc7f);
            width: 0%;
            transition: width 0.3s ease-out;
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.6);
        }

        .loading-text {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Laptop Screen */
        .laptop-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 20;
            transform: scale(0.5);
            transition: all 2s ease-out;
        }

        .laptop-screen.active {
            opacity: 1;
            transform: scale(1);
        }

        .laptop-frame {
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: #111;
            border: 3px solid #00ff9f;
            border-radius: 15px;
            box-shadow: 0 0 100px rgba(0, 255, 159, 0.5);
            position: relative;
            overflow: hidden;
        }

        .laptop-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px;
        }

        .laptop-title {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 255, 159, 0.8);
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .laptop-subtitle {
            font-size: 1rem;
            color: #00ff9f;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .laptop-buttons {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }

        .laptop-btn {
            background: transparent;
            border: 2px solid #00ff9f;
            color: #00ff9f;
            padding: 20px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .laptop-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 159, 0.2);
            transition: left 0.3s ease;
        }

        .laptop-btn:hover::before {
            left: 0;
        }

        .laptop-btn:hover {
            box-shadow: 0 0 30px rgba(0, 255, 159, 0.6);
            transform: translateY(-3px);
        }

        /* Glitch Effects */
        .glitch {
            animation: glitchEffect 0.3s ease-in-out;
        }

        @keyframes glitchEffect {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .rgb-split {
            animation: rgbSplit 0.5s ease-in-out;
        }

        @keyframes rgbSplit {
            0%, 100% { filter: hue-rotate(0deg); }
            33% { filter: hue-rotate(120deg); }
            66% { filter: hue-rotate(240deg); }
        }

        /* Screen Flicker */
        .screen-flicker {
            animation: screenFlicker 0.1s ease-in-out;
        }

        @keyframes screenFlicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .terminal-container {
                width: 90%;
                height: 300px;
                padding: 20px;
            }
            
            .laptop-title {
                font-size: 1.8rem;
            }
            
            .laptop-buttons {
                flex-direction: column;
                gap: 20px;
            }
            
            .laptop-btn {
                padding: 15px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Server Room Background -->
    <div class="server-room" id="serverRoom">
        <!-- Three.js 3D Scene Container -->
        <div id="threejs-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></div>
        
        <!-- Binary Rain Canvas (will be replaced by 3D) -->
        <canvas id="binaryCanvas" style="display: none;"></canvas>
        
        <!-- Terminal Container (will overlay on 3D) -->
        <div class="terminal-container" id="terminal" style="z-index: 10;">
            <div id="terminalOutput"></div>
            
            <!-- Loading Container -->
            <div class="loading-container" id="loadingContainer">
                <div class="loading-bar">
                    <div class="loading-progress" id="loadingProgress"></div>
                </div>
                <div class="loading-text" id="loadingText">INITIALIZING...</div>
            </div>
        </div>
    </div>
    
    <!-- Laptop Screen (Hidden Initially) -->
    <div class="laptop-screen" id="laptopScreen">
        <div class="laptop-frame">
            <div class="laptop-content">
                <h1 class="laptop-title">BLACKSITE ACCESS</h1>
                <div class="laptop-subtitle">Initializing main system...</div>
                <div class="laptop-buttons">
                    <button class="laptop-btn" onclick="goToRegister()">CREATE ACCOUNT</button>
                    <button class="laptop-btn" onclick="goToLogin()">EXISTING USER</button>
                    <button class="laptop-btn primary" onclick="goToMainSite()">ENTER SITE</button>
                </div>
                <div class="auto-redirect-info">
                    <p>Auto-redirecting to main site in <span id="countdown">5</span> seconds...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Three.js 3D Scene Manager
        class ThreeJSScene {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.mixer = null;
                this.model = null;
                this.cameraAnimation = null; // Initialize camera animation
                this.animationPhase = 'black'; // black, glitch, move, laptop, transition
                this.clock = new THREE.Clock();
                
                this.init();
            }
            
            init() {
                // Scene setup
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                
                // Camera setup
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 1.6, 5); // Human eye level
                
                // Renderer setup
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // Add to container
                const container = document.getElementById('threejs-container');
                container.appendChild(this.renderer.domElement);
                
                // Lighting
                this.setupLighting();
                
                // Window resize handler
                window.addEventListener('resize', () => this.onWindowResize());
                
                // Start animation loop
                this.animate();
                
                // Start animation sequence
                setTimeout(() => this.startAnimationSequence(), 1000);
            }
            
            setupLighting() {
                // Ambient light
                const ambientLight = new THREE.AmbientLight(0x00ff9f, 0.2);
                this.scene.add(ambientLight);
                
                // Point lights for server glow
                const serverLight1 = new THREE.PointLight(0x00ff9f, 1, 10);
                serverLight1.position.set(2, 2, 2);
                serverLight1.castShadow = true;
                this.scene.add(serverLight1);
                
                const serverLight2 = new THREE.PointLight(0x00ff9f, 0.5, 8);
                serverLight2.position.set(-2, 1, -2);
                this.scene.add(serverLight2);
                
                // Directional light for overall scene
                const dirLight = new THREE.DirectionalLight(0x00ff9f, 0.3);
                dirLight.position.set(5, 10, 5);
                dirLight.castShadow = true;
                this.scene.add(dirLight);
            }
            
            loadGLBModel() {
                const loader = new THREE.GLTFLoader();
                
                // Load your GLB animation here
                loader.load(
                    'server-room-animation.glb', // Your GLB file path
                    (gltf) => {
                        this.model = gltf.scene;
                        this.scene.add(this.model);
                        
                        // Setup animation mixer
                        if (gltf.animations && gltf.animations.length > 0) {
                            console.log(`Found ${gltf.animations.length} animations:`, gltf.animations.map(anim => anim.name));
                            
                            this.mixer = new THREE.AnimationMixer(this.model);
                            
                            // Play all animations
                            gltf.animations.forEach((clip, index) => {
                                const action = this.mixer.clipAction(clip);
                                action.setLoop(THREE.LoopRepeat, Infinity); // Loop forever
                                action.clampWhenFinished = false;
                                action.play();
                                console.log(`Playing animation ${index}: ${clip.name}`);
                            });
                        } else {
                            console.log('No animations found in GLB file');
                        }
                        
                        // Scale and position the model if needed
                        this.model.scale.set(1, 1, 1);
                        this.model.position.set(0, 0, 0);
                        
                        console.log('GLB model loaded successfully');
                    },
                    (progress) => {
                        console.log('Loading progress:', (progress.loaded / progress.total * 100) + '%');
                    },
                    (error) => {
                        console.error('Error loading GLB model:', error);
                        // Fallback to basic scene
                        this.createFallbackScene();
                    }
                );
            }
            
            createFallbackScene() {
                // Create basic server room if GLB fails to load
                const geometry = new THREE.BoxGeometry(1, 2, 0.1);
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0x00ff9f, 
                    emissive: 0x00ff9f, 
                    emissiveIntensity: 0.2 
                });
                
                // Create server racks
                for (let i = 0; i < 5; i++) {
                    const server = new THREE.Mesh(geometry, material);
                    server.position.set(i * 2 - 4, 1, -3);
                    this.scene.add(server);
                }
                
                console.log('Fallback scene created');
            }
            
            startAnimationSequence() {
                console.log('Starting 3D animation sequence');
                
                // Phase 1: Black (1 second)
                setTimeout(() => {
                    this.animationPhase = 'glitch';
                    this.addGlitchEffect();
                }, 1000);
                
                // Phase 2: Load GLB and start glitch
                this.loadGLBModel();
                
                // Phase 3: Camera movement (starts after 2 seconds)
                setTimeout(() => {
                    this.animationPhase = 'move';
                    this.animateCameraMovement();
                }, 3000);
                
                // Phase 4: Laptop reveal (starts after 5 seconds)
                setTimeout(() => {
                    this.animationPhase = 'laptop';
                    this.revealLaptop();
                }, 6000);
                
                // Phase 5: Transition to terminal (starts after 8 seconds)
                setTimeout(() => {
                    this.animationPhase = 'transition';
                    this.transitionToTerminal();
                }, 8000);
            }
            
            addGlitchEffect() {
                // Add glitch post-processing effect
                console.log('Adding glitch effect');
                
                // Simple glitch simulation with light flickering
                const lights = this.scene.children.filter(child => child instanceof THREE.Light);
                lights.forEach(light => {
                    if (light instanceof THREE.PointLight) {
                        // Flicker effect
                        const originalIntensity = light.intensity;
                        light.intensity = originalIntensity * 0.1;
                        
                        const flickerInterval = setInterval(() => {
                            light.intensity = originalIntensity * (Math.random() * 0.5 + 0.5);
                        }, 100);
                        
                        setTimeout(() => {
                            clearInterval(flickerInterval);
                            light.intensity = originalIntensity;
                        }, 2000);
                    }
                });
            }
            
            animateCameraMovement() {
                console.log('Starting camera movement');
                
                // Set camera animation parameters
                this.cameraAnimation = {
                    startPos: new THREE.Vector3(0, 1.6, 5),
                    endPos: new THREE.Vector3(-3, 1.6, 2),
                    startLookAt: new THREE.Vector3(0, 1.6, 0),
                    endLookAt: new THREE.Vector3(-2, 1.6, -1),
                    duration: 3000, // 3 seconds
                    startTime: Date.now(),
                    active: true
                };
            }
            
            revealLaptop() {
                console.log('Revealing laptop');
                
                // This will be handled by your GLB animation
                // But we can add effects here if needed
                
                // Fade to black for transition
                setTimeout(() => {
                    this.renderer.domElement.style.opacity = '0';
                    this.renderer.domElement.style.transition = 'opacity 1s';
                }, 1000);
            }
            
            transitionToTerminal() {
                console.log('Transitioning to terminal');
                
                // Hide 3D scene
                const container = document.getElementById('threejs-container');
                container.style.display = 'none';
                
                // Show terminal overlay
                const terminal = document.getElementById('terminal');
                terminal.style.display = 'block';
                
                // Start existing terminal sequence
                if (window.hackerIntro) {
                    window.hackerIntro.showTerminal();
                }
            }
            
            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                const delta = this.clock.getDelta();
                
                // Update animations
                if (this.mixer) {
                    this.mixer.update(delta);
                    
                    // Debug: Log animation state every few seconds
                    if (Math.random() < 0.01) { // 1% chance each frame
                        console.log('Animation mixer is running, delta:', delta);
                    }
                }
                
                // Update camera movement if active
                if (this.cameraAnimation && this.cameraAnimation.active) {
                    const elapsed = Date.now() - this.cameraAnimation.startTime;
                    const progress = Math.min(elapsed / this.cameraAnimation.duration, 1);
                    
                    // Smooth easing
                    const eased = 1 - Math.pow(1 - progress, 3);
                    
                    // Interpolate camera position
                    this.camera.position.lerpVectors(this.cameraAnimation.startPos, this.cameraAnimation.endPos, eased);
                    
                    // Interpolate look-at position
                    const currentLookAt = new THREE.Vector3().lerpVectors(
                        this.cameraAnimation.startLookAt, 
                        this.cameraAnimation.endLookAt, 
                        eased
                    );
                    this.camera.lookAt(currentLookAt);
                    
                    // Check if animation is complete
                    if (progress >= 1) {
                        this.cameraAnimation.active = false;
                        console.log('Camera movement completed');
                    }
                }
                
                // Render scene
                if (this.renderer && this.scene && this.camera) {
                    this.renderer.render(this.scene, this.camera);
                }
            }
        }
        
        // Binary Rain Effect (will be replaced by 3D)
        class BinaryRain {
            constructor() {
                this.canvas = document.getElementById('binaryCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                this.columns = [];
                this.init();
                this.animate();
                
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.columnWidth = 20;
                this.columnCount = Math.floor(this.canvas.width / this.columnWidth);
            }
            
            init() {
                for (let i = 0; i < this.columnCount; i++) {
                    this.columns[i] = {
                        x: i * this.columnWidth,
                        y: Math.random() * this.canvas.height,
                        speed: 1 + Math.random() * 2,
                        chars: [],
                        opacity: Math.random() * 0.5 + 0.3
                    };
                    
                    const charCount = Math.floor(Math.random() * 10) + 5;
                    for (let j = 0; j < charCount; j++) {
                        this.columns[i].chars.push(Math.random() > 0.5 ? '1' : '0');
                    }
                }
            }
            
            animate() {
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.font = '12px Courier New';
                
                this.columns.forEach(column => {
                    column.chars.forEach((char, index) => {
                        const y = column.y - (index * 15);
                        
                        if (y > 0 && y < this.canvas.height) {
                            const fadeOpacity = (1 - index / column.chars.length) * column.opacity;
                            const green = Math.floor(255 * fadeOpacity);
                            
                            this.ctx.fillStyle = `rgba(0, ${green}, 159, ${fadeOpacity})`;
                            this.ctx.fillText(char, column.x, y);
                        }
                    });
                    
                    column.y += column.speed;
                    
                    if (column.y - column.chars.length * 15 > this.canvas.height) {
                        column.y = -column.chars.length * 15;
                        column.speed = 1 + Math.random() * 2;
                        column.opacity = Math.random() * 0.5 + 0.3;
                    }
                });
                
                requestAnimationFrame(() => this.animate());
            }
        }

        // Hacker Intro System
        class HackerIntro {
            constructor() {
                console.log('HackerIntro constructor called');
                this.binaryRain = new BinaryRain();
                console.log('BinaryRain initialized');
                this.terminalLines = [];
                this.currentLineIndex = 0;
                this.loadingProgress = 0;
                this.phase = 'terminal';
                
                this.generateTerminalLines();
                console.log('Terminal lines generated:', this.terminalLines.length);
                this.startIntro();
                console.log('Intro started');
            }
            
            generateTerminalLines() {
                const fakeIPs = [
                    '192.168.42.77',
                    '10.0.0.1',
                    '172.16.0.1',
                    '203.0.113.42',
                    '198.51.100.7',
                    '8.8.8.8'
                ];
                
                const crypticWords = [
                    'QUANTUM_ENCRYPTION',
                    'NEURAL_DECRYPTION',
                    'FIREWALL_BYPASS',
                    'PROTOCOL_INJECTION',
                    'KERNEL_ACCESS',
                    'ROOT_PRIVILEGES',
                    'STEALTH_MODE',
                    'CIPHER_BREAK',
                    'HEX_DECODER',
                    'BINARY_MATRIX',
                    'ALGORITHM_CRACK',
                    'SECURITY_BREACH'
                ];
                
                const loadingMessages = [
                    'Initializing quantum encryption...',
                    'Bypassing firewall protocols...',
                    'Decrypting neural pathways...',
                    'Establishing secure connection...',
                    'Loading kernel modules...',
                    'Scanning network topology...',
                    'Compiling exploit vectors...',
                    'Initializing root access...',
                    'Configuring stealth mode...',
                    'Analyzing system vulnerabilities...'
                ];
                
                this.terminalLines = [
                    { text: '> BOOTING BLACKSITE SYSTEM...', type: 'success', delay: 0 },
                    { text: `> CONNECTING TO ${fakeIPs[Math.floor(Math.random() * fakeIPs.length)]}...`, type: 'normal', delay: 300 },
                    { text: '> AUTHENTICATING...', type: 'normal', delay: 600 },
                    { text: '> ESTABLISHING SECURE CHANNEL...', type: 'normal', delay: 900 },
                    { text: '> LOADING SECURITY PROTOCOLS...', type: 'normal', delay: 1200 },
                    { text: `${crypticWords[Math.floor(Math.random() * crypticWords.length)]}... ACTIVE`, type: 'warning', delay: 1500 },
                    { text: `${loadingMessages[Math.floor(Math.random() * loadingMessages.length)]}`, type: 'normal', delay: 1800 },
                    { text: '> DECRYPTING NODE...', type: 'normal', delay: 2100 },
                    { text: '> ACCESS GRANTED', type: 'success', delay: 2400 },
                    { text: '> WELCOME TO BLACKSITE NETWORK', type: 'success', delay: 2700 }
                ];
                
                // Add some random errors
                if (Math.random() > 0.7) {
                    this.terminalLines.splice(4, 0, { text: '> ERROR: CONNECTION INTERRUPTED', type: 'error', delay: 1350 });
                    this.terminalLines.splice(5, 0, { text: '> RETRYING...', type: 'warning', delay: 1650 });
                }
            }
            
            startIntro() {
                console.log('Starting intro sequence');
                this.showTerminal();
                setTimeout(() => this.startLoading(), 3000); // Reduced delay
            }
            
            showTerminal() {
                console.log('Showing terminal');
                const terminal = document.getElementById('terminal');
                const output = document.getElementById('terminalOutput');
                
                console.log('Terminal element:', terminal);
                console.log('Output element:', output);
                
                terminal.classList.add('show');
                
                this.terminalLines.forEach((line, index) => {
                    setTimeout(() => {
                        console.log(`Adding line ${index}: ${line.text}`);
                        this.addTerminalLine(line.text, line.type);
                    }, line.delay);
                });
            }
            
            addTerminalLine(text, type = 'normal') {
                const output = document.getElementById('terminalOutput');
                const line = document.createElement('div');
                line.className = `terminal-line ${type}`;
                line.textContent = text;
                
                output.appendChild(line);
                
                console.log(`Line added: ${text}`);
                
                // Simple glitch effect
                if (Math.random() > 0.8) {
                    setTimeout(() => {
                        line.classList.add('glitch');
                        setTimeout(() => line.classList.remove('glitch'), 300);
                    }, 600);
                }
            }
            
            startLoading() {
                const loadingContainer = document.getElementById('loadingContainer');
                const loadingProgress = document.getElementById('loadingProgress');
                const loadingText = document.getElementById('loadingText');
                
                const loadingMessages = [
                    'INITIALIZING...',
                    'DECRYPTING...',
                    'BYPASSING...',
                    'ACCESSING...',
                    'CONNECTING...'
                ];
                
                let progress = 0;
                const loadingInterval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(loadingInterval);
                        
                        setTimeout(() => {
                            this.transitionToLaptop();
                        }, 1000);
                    }
                    
                    loadingProgress.style.width = `${progress}%`;
                    loadingText.textContent = `${loadingMessages[Math.floor(Math.random() * loadingMessages.length)]} ${Math.floor(progress)}%`;
                    
                    // Random screen flicker
                    if (Math.random() > 0.9) {
                        document.getElementById('serverRoom').classList.add('screen-flicker');
                        setTimeout(() => {
                            document.getElementById('serverRoom').classList.remove('screen-flicker');
                        }, 100);
                    }
                }, 200);
            }
            
            transitionToLaptop() {
                const serverRoom = document.getElementById('serverRoom');
                const laptopScreen = document.getElementById('laptopScreen');
                
                // Add RGB split effect
                serverRoom.classList.add('rgb-split');
                
                setTimeout(() => {
                    serverRoom.classList.add('fade-out');
                    laptopScreen.classList.add('active');
                    
                    setTimeout(() => {
                        serverRoom.style.display = 'none';
                        // Start auto-redirect after laptop screen appears
                        autoRedirect();
                    }, 2000);
                }, 500);
            }
        }
        
        // Navigation Functions
        function goToRegister() {
            window.location.href = 'hacker-register.html';
        }
        
        function goToLogin() {
            window.location.href = 'index.html#mail';
        }
        
        function goToMainSite() {
            // Mark intro as completed
            sessionStorage.setItem('introCompleted', 'true');
            console.log('Intro marked as completed, redirecting to main site...');
            window.location.href = 'index.html';
        }
        
        // Auto-redirect after intro completes
        function autoRedirect() {
            console.log('Intro sequence completed, redirecting to main site...');
            
            // Start countdown
            let countdown = 5;
            const countdownEl = document.getElementById('countdown');
            
            const countdownInterval = setInterval(() => {
                countdown--;
                if (countdownEl) {
                    countdownEl.textContent = countdown;
                }
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    console.log('Mail system should be initialized, redirecting...');
                    goToMainSite();
                }
            }, 1000);
        }
        
        // Initialize Intro
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded - Starting Hacker Intro');
            
            // Initialize Three.js scene
            const threeScene = new ThreeJSScene();
            
            // Initialize HackerIntro system (for terminal overlay)
            window.hackerIntro = new HackerIntro();
            
            // Fallback: Show terminal immediately if initialization fails
            setTimeout(() => {
                const terminal = document.getElementById('terminal');
                const output = document.getElementById('terminalOutput');
                
                if (terminal && output) {
                    terminal.classList.add('show');
                    output.innerHTML = `
                        <div class="terminal-line success">> BOOTING BLACKSITE SYSTEM...</div>
                        <div class="terminal-line">> CONNECTING TO 192.168.42.77...</div>
                        <div class="terminal-line">> AUTHENTICATING...</div>
                        <div class="terminal-line">> ESTABLISHING SECURE CHANNEL...</div>
                        <div class="terminal-line">> LOADING SECURITY PROTOCOLS...</div>
                        <div class="terminal-line warning">> QUANTUM_ENCRYPTION... ACTIVE</div>
                        <div class="terminal-line">> DECRYPTING NODE...</div>
                        <div class="terminal-line success">> ACCESS GRANTED</div>
                        <div class="terminal-line success">> WELCOME TO BLACKSITE NETWORK</div>
                    `;
                    console.log('Fallback terminal shown');
                }
            }, 100);
            
            // Auto-start loading sequence as backup
            setTimeout(() => {
                const loadingContainer = document.getElementById('loadingContainer');
                const loadingProgress = document.getElementById('loadingProgress');
                const loadingText = document.getElementById('loadingText');
                
                if (loadingContainer && loadingProgress && loadingText) {
                    loadingContainer.style.opacity = '1';
                    let progress = 0;
                    const loadingInterval = setInterval(() => {
                        progress += Math.random() * 15 + 5;
                        if (progress >= 100) {
                            progress = 100;
                            clearInterval(loadingInterval);
                            
                            // Transition to laptop screen
                            setTimeout(() => {
                                const serverRoom = document.getElementById('serverRoom');
                                const laptopScreen = document.getElementById('laptopScreen');
                                
                                if (serverRoom && laptopScreen) {
                                    serverRoom.classList.add('fade-out');
                                    laptopScreen.classList.add('active');
                                    
                                    setTimeout(() => {
                                        serverRoom.style.display = 'none';
                                        // Start auto-redirect after laptop screen appears
                                        autoRedirect();
                                    }, 2000);
                                }
                            }, 1000);
                        }
                        
                        loadingProgress.style.width = `${progress}%`;
                        loadingText.textContent = `INITIALIZING... ${Math.floor(progress)}%`;
                    }, 200);
                }
            }, 3000);
            
            console.log('3D Intro system initialized successfully');
        });
    </script>
</body>
